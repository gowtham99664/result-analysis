<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#E0F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5DC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C19660;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="420" width="1200" height="180" fill="#4CAF50" opacity="0.6"/>
  <rect x="0" y="440" width="1200" height="160" fill="#388E3C" opacity="0.4"/>
  <!-- Road -->
  <path d="M 300,600 L 500,440 L 700,440 L 900,600 Z" fill="#666"/>
  <path d="M 450,600 L 550,440 L 650,440 L 750,600 Z" fill="#777"/>
  <!-- Main Building -->
  <rect x="350" y="200" width="500" height="240" fill="url(#building)" stroke="#8B6914" stroke-width="2"/>
  <!-- Entrance Gate -->
  <rect x="540" y="300" width="120" height="140" fill="#8B4513" rx="5"/>
  <path d="M 540,300 Q 600,260 660,300" fill="#A0522D" stroke="#8B6914" stroke-width="2"/>
  <!-- Windows -->
  <g fill="#87CEEB" stroke="#8B6914" stroke-width="1.5">
    <rect x="380" y="230" width="40" height="50" rx="3"/>
    <rect x="440" y="230" width="40" height="50" rx="3"/>
    <rect x="500" y="230" width="40" height="50" rx="3"/>
    <rect x="660" y="230" width="40" height="50" rx="3"/>
    <rect x="720" y="230" width="40" height="50" rx="3"/>
    <rect x="780" y="230" width="40" height="50" rx="3"/>
    <rect x="380" y="310" width="40" height="50" rx="3"/>
    <rect x="440" y="310" width="40" height="50" rx="3"/>
    <rect x="720" y="310" width="40" height="50" rx="3"/>
    <rect x="780" y="310" width="40" height="50" rx="3"/>
  </g>
  <!-- Tower/Dome -->
  <rect x="560" y="140" width="80" height="60" fill="#C19660" stroke="#8B6914" stroke-width="2"/>
  <path d="M 555,140 Q 600,90 645,140" fill="#D4A574" stroke="#8B6914" stroke-width="2"/>
  <circle cx="600" cy="110" r="8" fill="#f9a825"/>
  <!-- Side pillars -->
  <rect x="345" y="200" width="15" height="240" fill="#B8860B"/>
  <rect x="840" y="200" width="15" height="240" fill="#B8860B"/>
  <!-- Nameplate -->
  <rect x="390" y="180" width="420" height="30" fill="#1a237e" rx="3"/>
  <text x="600" y="200" text-anchor="middle" fill="white" font-family="serif" font-size="14" font-weight="bold">SRI PADMAVATI MAHILA VISVAVIDYALAYAM</text>
  <!-- Trees -->
  <g>
    <rect x="180" y="350" width="15" height="70" fill="#5D4037"/>
    <circle cx="188" cy="330" r="40" fill="#2E7D32" opacity="0.8"/>
    <circle cx="175" cy="345" r="30" fill="#388E3C" opacity="0.7"/>
    <circle cx="200" cy="340" r="35" fill="#1B5E20" opacity="0.6"/>
  </g>
  <g>
    <rect x="950" y="350" width="15" height="70" fill="#5D4037"/>
    <circle cx="958" cy="330" r="40" fill="#2E7D32" opacity="0.8"/>
    <circle cx="945" cy="345" r="30" fill="#388E3C" opacity="0.7"/>
    <circle cx="970" cy="340" r="35" fill="#1B5E20" opacity="0.6"/>
  </g>
  <g>
    <rect x="100" y="360" width="12" height="60" fill="#5D4037"/>
    <circle cx="106" cy="340" r="35" fill="#388E3C" opacity="0.7"/>
  </g>
  <g>
    <rect x="1050" y="360" width="12" height="60" fill="#5D4037"/>
    <circle cx="1056" cy="340" r="35" fill="#388E3C" opacity="0.7"/>
  </g>
  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <circle cx="200" cy="80" r="30"/>
    <circle cx="230" cy="70" r="35"/>
    <circle cx="260" cy="80" r="25"/>
  </g>
  <g fill="white" opacity="0.7">
    <circle cx="900" cy="60" r="25"/>
    <circle cx="930" cy="50" r="30"/>
    <circle cx="960" cy="60" r="20"/>
  </g>
</svg>
